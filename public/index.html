<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0f17">
    <meta name="robots" content="noindex, nofollow">
    <title>Salvación</title>
    <style>
        :root{
            color-scheme: dark;
            --bg: #080b11;
            --surface: #111722;
            --surface-strong: #171f2c;
            --surface-soft: #0d121b;
            --border: #283244;
            --border-strong: #3a465b;
            --text: #f4f7fb;
            --muted: #9aa6b8;
            --green: #38d996;
            --green-dark: #123d30;
            --green-border: #287558;
            --red: #ff7f87;
            --red-dark: #3b1f26;
            --red-border: #7a3844;
            --blue: #7eb6ff;
            --shadow: 0 22px 70px rgba(0, 0, 0, .34);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        *{
            box-sizing: border-box;
        }

        html{
            min-height: 100%;
            background: var(--bg);
        }

        body{
            min-width: 320px;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            background:
                radial-gradient(circle at 12% -10%, rgba(56, 217, 150, .11), transparent 34rem),
                radial-gradient(circle at 95% 10%, rgba(74, 131, 255, .08), transparent 30rem),
                var(--bg);
        }

        button,
        input,
        textarea{
            font: inherit;
        }

        button{
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell{
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 34px 0 64px;
        }

        .brand{
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .brand-mark{
            display: grid;
            width: 46px;
            height: 46px;
            place-items: center;
            border: 1px solid rgba(56, 217, 150, .42);
            border-radius: 14px;
            color: var(--green);
            background: rgba(56, 217, 150, .09);
            font-weight: 800;
            box-shadow: 0 0 36px rgba(56, 217, 150, .08);
        }

        .brand-kicker{
            margin: 0 0 2px;
            color: var(--muted);
            font-size: .7rem;
            font-weight: 750;
            letter-spacing: .16em;
            text-transform: uppercase;
        }

        h1,
        h2,
        p{
            margin-top: 0;
        }

        h1{
            margin-bottom: 0;
            font-size: clamp(1.35rem, 3vw, 1.7rem);
            letter-spacing: -.03em;
        }

        h2{
            margin-bottom: 8px;
            font-size: clamp(1.35rem, 3vw, 1.8rem);
            letter-spacing: -.035em;
        }

        .tabs{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: min(440px, 100%);
            margin-bottom: 16px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(13, 18, 27, .82);
        }

        .tab-button{
            min-height: 44px;
            padding: 9px 16px;
            border: 0;
            border-radius: 10px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            font-weight: 720;
            transition: color .18s ease, background .18s ease, box-shadow .18s ease;
        }

        .tab-button:hover{
            color: var(--text);
        }

        .tab-button.is-active{
            color: #07110d;
            background: var(--green);
            box-shadow: 0 8px 22px rgba(56, 217, 150, .17);
        }

        .panel{
            padding: clamp(20px, 4vw, 34px);
            border: 1px solid var(--border);
            border-radius: 20px;
            background: linear-gradient(145deg, rgba(17, 23, 34, .97), rgba(12, 17, 25, .97));
            box-shadow: var(--shadow);
        }

        .panel[hidden]{
            display: none;
        }

        .panel-heading{
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }

        .panel-heading p,
        .helper-text{
            margin-bottom: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .notice{
            margin-bottom: 18px;
            padding: 12px 14px;
            border: 1px solid;
            border-radius: 12px;
            line-height: 1.45;
        }

        .notice[hidden]{
            display: none;
        }

        .notice.success{
            border-color: var(--green-border);
            color: #a9f2d2;
            background: var(--green-dark);
        }

        .notice.error{
            border-color: var(--red-border);
            color: #ffc4c8;
            background: var(--red-dark);
        }

        label{
            display: inline-block;
            margin-bottom: 9px;
            color: #dbe3ee;
            font-size: .91rem;
            font-weight: 700;
        }

        textarea,
        input{
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 13px;
            outline: none;
            color: var(--text);
            background: var(--surface-soft);
            transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
        }

        textarea:focus,
        input:focus{
            border-color: var(--green-border);
            background: #0e151e;
            box-shadow: 0 0 0 4px rgba(56, 217, 150, .09);
        }

        textarea{
            min-height: clamp(360px, 53vh, 680px);
            padding: 16px;
            resize: vertical;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: .91rem;
            line-height: 1.55;
            tab-size: 4;
        }

        input{
            min-height: 48px;
            padding: 0 14px;
        }

        ::placeholder{
            color: #687588;
            opacity: 1;
        }

        .editor-footer{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 14px;
        }

        .text-stats{
            color: var(--muted);
            font-size: .82rem;
            font-variant-numeric: tabular-nums;
        }

        .primary-button,
        .secondary-button,
        .copy-button{
            display: inline-flex;
            min-height: 44px;
            align-items: center;
            justify-content: center;
            border-radius: 11px;
            cursor: pointer;
            font-weight: 760;
            transition: transform .15s ease, border-color .15s ease, background .15s ease, opacity .15s ease;
        }

        .primary-button{
            min-width: 132px;
            padding: 10px 22px;
            border: 1px solid var(--green);
            color: #06110c;
            background: var(--green);
        }

        .primary-button:hover:not(:disabled){
            transform: translateY(-1px);
            background: #5be3aa;
        }

        .secondary-button,
        .copy-button{
            padding: 8px 14px;
            border: 1px solid var(--border-strong);
            color: #dfe6ef;
            background: var(--surface-strong);
        }

        .secondary-button:hover:not(:disabled),
        .copy-button:hover:not(:disabled){
            border-color: #596781;
            background: #202a39;
        }

        button:disabled{
            cursor: wait;
            opacity: .62;
        }

        .unlock-card{
            max-width: 620px;
            padding: clamp(18px, 4vw, 26px);
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(8, 12, 18, .58);
        }

        .unlock-row{
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
        }

        .recovery-toolbar{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .recovery-toolbar[hidden]{
            display: none;
        }

        .recovery-status{
            margin-bottom: 0;
            color: var(--muted);
            font-size: .9rem;
        }

        .entries{
            display: grid;
            gap: 16px;
        }

        .entry-card{
            min-width: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 15px;
            background: #0b1018;
        }

        .entry-header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 11px 12px 11px 15px;
            border-bottom: 1px solid var(--border);
            background: #141b27;
        }

        .entry-meta{
            min-width: 0;
        }

        .entry-title{
            display: block;
            margin-bottom: 2px;
            font-size: .9rem;
            font-weight: 760;
        }

        .entry-detail{
            display: block;
            overflow: hidden;
            color: var(--muted);
            font-size: .76rem;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-button{
            min-width: 84px;
            min-height: 38px;
            flex: 0 0 auto;
            font-size: .86rem;
        }

        .copy-button.copied{
            border-color: var(--green-border);
            color: #9df0cb;
            background: var(--green-dark);
        }

        .entry-text{
            max-height: 620px;
            min-height: 74px;
            margin: 0;
            overflow: auto;
            padding: 16px;
            color: #e8edf5;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: .84rem;
            line-height: 1.55;
            overflow-wrap: anywhere;
            tab-size: 4;
            white-space: pre-wrap;
        }

        .entry-card.has-error{
            border-color: var(--red-border);
        }

        .entry-card.has-error .entry-text{
            color: #ffc4c8;
        }

        .empty-state{
            padding: 48px 20px;
            border: 1px dashed var(--border-strong);
            border-radius: 15px;
            color: var(--muted);
            text-align: center;
        }

        .empty-state[hidden]{
            display: none;
        }

        @media (max-width: 680px){
            .app-shell{
                width: min(100% - 20px, 1120px);
                padding-top: 20px;
            }

            .brand{
                margin-left: 4px;
            }

            .tabs{
                width: 100%;
            }

            .panel{
                border-radius: 16px;
            }

            .panel-heading,
            .editor-footer,
            .recovery-toolbar{
                align-items: stretch;
                flex-direction: column;
            }

            .primary-button,
            .secondary-button{
                width: 100%;
            }

            .unlock-row{
                grid-template-columns: 1fr;
            }

            textarea{
                min-height: 54vh;
            }

            .entry-header{
                align-items: flex-start;
            }

            .entry-text{
                max-height: 72vh;
            }
        }

        @media (prefers-reduced-motion: reduce){
            *,
            *::before,
            *::after{
                scroll-behavior: auto !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="brand">
            <div class="brand-mark" aria-hidden="true">S</div>
            <div>
                <p class="brand-kicker">Archivo personal</p>
                <h1>Salvación</h1>
            </div>
        </header>

        <nav class="tabs" role="tablist" aria-label="Secciones">
            <button
                class="tab-button is-active"
                id="tab-save"
                type="button"
                role="tab"
                aria-selected="true"
                aria-controls="panel-save"
                data-tab="save"
            >Guardar</button>
            <button
                class="tab-button"
                id="tab-recover"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="panel-recover"
                data-tab="recover"
            >Recuperar</button>
        </nav>

        <section
            class="panel"
            id="panel-save"
            role="tabpanel"
            aria-labelledby="tab-save"
        >
            <div class="panel-heading">
                <div>
                    <h2>Guardar texto</h2>
                    <p>Pega aquí el contenido. Se almacenará completo, incluidos sus saltos de línea.</p>
                </div>
            </div>

            <div class="notice" id="save-notice" role="status" aria-live="polite" hidden></div>

            <form id="save-form">
                <label for="save-text">Contenido</label>
                <textarea
                    id="save-text"
                    name="text"
                    placeholder="Pega aquí todo lo que quieras guardar…"
                    spellcheck="false"
                    autocomplete="off"
                ></textarea>
                <div class="editor-footer">
                    <span class="text-stats" id="text-stats">0 caracteres · 0 B</span>
                    <button class="primary-button" id="save-button" type="submit">Guardar</button>
                </div>
            </form>
        </section>

        <section
            class="panel"
            id="panel-recover"
            role="tabpanel"
            aria-labelledby="tab-recover"
            hidden
        >
            <div class="panel-heading">
                <div>
                    <h2>Recuperar textos</h2>
                    <p>Ingresa la contraseña para mostrar todo lo que se ha guardado.</p>
                </div>
            </div>

            <div class="notice" id="recover-notice" role="alert" aria-live="assertive" hidden></div>

            <div class="unlock-card" id="unlock-card">
                <form id="unlock-form">
                    <label for="recovery-password">Contraseña</label>
                    <div class="unlock-row">
                        <input
                            id="recovery-password"
                            name="password"
                            type="password"
                            placeholder="Ingresa la contraseña"
                            autocomplete="current-password"
                            required
                        >
                        <button class="primary-button" id="unlock-button" type="submit">Recuperar</button>
                    </div>
                </form>
            </div>

            <div class="recovery-toolbar" id="recovery-toolbar" hidden>
                <div>
                    <h2>Todo lo guardado</h2>
                    <p class="recovery-status" id="recovery-status" aria-live="polite"></p>
                </div>
                <button class="secondary-button" id="reload-button" type="button">Actualizar</button>
            </div>

            <div class="entries" id="entries"></div>
            <div class="empty-state" id="empty-state" hidden>No hay textos guardados todavía.</div>
        </section>
    </main>

    <script src="/app.js" defer></script>
</body>
</html>
